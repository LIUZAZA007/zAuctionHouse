################################################################################################################################
#
#   zAuctionHouse V4 - Inventario di Conferma Acquisto
#
#   Questo inventario chiede ai giocatori di confermare il loro acquisto prima di finalizzarlo.
#   Mostra l'oggetto da acquistare con le opzioni conferma/annulla.
#
#   FUNZIONALITÀ:
#   - Anteprima dell'oggetto prima dell'acquisto
#   - Vedere il contenuto delle shulker (se applicabile)
#   - Confermare o annullare l'acquisto
#
#   ACCESSO:
#   - Si apre automaticamente cliccando su un oggetto da acquistare nella casa d'aste
#
#   Documentazione: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# IMPOSTAZIONI DELL'INVENTARIO
#=============================================================================

# Titolo dell'inventario - formato domanda per maggiore chiarezza.
name: "#0c1719Acquistare questo oggetto?"

# Dimensione dell'inventario - 3 righe (27 slot) per un dialogo di conferma compatto.
size: 27

#=============================================================================
# OGGETTI
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # PULSANTE CONFERMA
  #---------------------------------------------------------------------------
  # Finalizza l'acquisto e trasferisce denaro/oggetto.

  confirm:
    # Tipo di pulsante - gestisce la conferma dell'acquisto.
    type: ZAUCTIONHOUSE_CONFIRM_PURCHASE

    item:
      # Vetro verde per l'azione di conferma.
      material: GREEN_STAINED_GLASS_PANE
      name: "#2CCED2<bold>ᴀᴄQᴜɪsᴛᴀ"
      lore:
        - "#92ffffAcquista questo oggetto."
        - ""
        - "#8c8c8c• #2CCED2Clicca #92ffffper acquistare"

    # Più slot per una zona di clic più grande.
    # Lato sinistro dell'inventario (griglia 3×3).
    slots:
      - 0-2     # Riga in alto a sinistra
      - 9-11    # Riga centrale a sinistra
      - 18-20   # Riga in basso a sinistra

  #---------------------------------------------------------------------------
  # PULSANTE ANNULLA/INDIETRO
  #---------------------------------------------------------------------------
  # Annulla l'acquisto e torna alla casa d'aste.

  deny:
    # Tipo di pulsante - torna all'inventario precedente.
    type: BACK

    item:
      # Vetro rosso per l'azione di annullamento.
      material: RED_STAINED_GLASS_PANE
      name: "#2CCED2<bold>ɪɴᴅɪᴇᴛʀᴏ"
      lore:
        - "#92ffffTorna indietro."
        - ""
        - "#8c8c8c• #2CCED2Clicca #92ffffper tornare"

    # Lato destro dell'inventario (griglia 3×3).
    slots:
      - 6-8     # Riga in alto a destra
      - 15-17   # Riga centrale a destra
      - 24-26   # Riga in basso a destra

  #---------------------------------------------------------------------------
  # DECORAZIONE
  #---------------------------------------------------------------------------
  # Riempie la colonna centrale con vetri.

  decoration:
    item:
      material: LIGHT_BLUE_STAINED_GLASS_PANE
      name: "#2CCED2"

    # Colonna centrale e slot circostanti.
    slots:
      - 3-5     # Centro in alto
      - 12      # Centro-sinistra del mezzo
      - 14      # Centro-destra del mezzo
      - 21-23   # Centro in basso

  #---------------------------------------------------------------------------
  # ANTEPRIMA DELL'OGGETTO
  #---------------------------------------------------------------------------
  # Mostra l'oggetto da acquistare al centro.

  show:
    # Tipo di pulsante - mostra l'oggetto dell'asta.
    type: ZAUCTIONHOUSE_SHOW

    # Slot centrale.
    slot: 13

  #---------------------------------------------------------------------------
  # PULSANTE CONTENUTO SHULKER
  #---------------------------------------------------------------------------
  # Apre il visualizzatore del contenuto shulker (mostrato solo per oggetti shulker).

  shulker:
    # Tipo di pulsante - apre l'anteprima del contenuto shulker.
    # Visibile solo quando l'oggetto contiene scatole shulker.
    type: ZAUCTIONHOUSE_SHULKER_OPEN

    # Posizione dello slot.
    slot: 4

    item:
      material: SHULKER_BOX
      name: "#2CCED2<bold>ᴠᴇᴅɪ ɪʟ ᴄᴏɴᴛᴇɴᴜᴛᴏ sʜᴜʟᴋᴇʀ"
      lore:
        - "#92ffffVedi il contenuto delle scatole shulker."
        - ""
        - "#8c8c8c• #2CCED2Clicca #92ffffper vedere il contenuto"

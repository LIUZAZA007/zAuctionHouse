################################################################################################################################
#
#   zAuctionHouse V4 - Inventario delle Categorie
#
#   Questo inventario mostra il menu di selezione delle categorie.
#   I giocatori possono scegliere una categoria per filtrare gli oggetti.
#
#   LE CATEGORIE SONO DEFINITE IN:
#   - categories.yml - Definisce quali oggetti appartengono a ciascuna categoria
#   - Questo file - Definisce i pulsanti GUI per ciascuna categoria
#
#   AGGIUNGERE NUOVE CATEGORIE:
#   1. Aggiungi la definizione della categoria in categories.yml (con le regole)
#   2. Aggiungi un pulsante qui con type: ZAUCTIONHOUSE_CATEGORY e category: <nome>
#   3. Usa il placeholder %zauctionhouse_category_count_<nome>% per i contatori
#
#   Documentazione: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# IMPOSTAZIONI DELL'INVENTARIO
#=============================================================================

# Titolo dell'inventario - testo statico per il menu delle categorie.
name: "#0c1719Categorie"

# Dimensione dell'inventario - 6 righe (54 slot).
size: 54

#=============================================================================
# PATTERN
#=============================================================================

patterns:
  # Bordi decorativi in vetro.
  - 'zauctionhouse-decoration'
  # Pulsante indietro per tornare alla casa d'aste.
  - 'zauctionhouse-back'

#=============================================================================
# PULSANTI DELLE CATEGORIE
#=============================================================================
# Ogni pulsante apre la casa d'aste filtrata per quella categoria.
# I tipi di pulsanti usano ZAUCTIONHOUSE_CATEGORY con un campo 'category'.
# Il valore 'category' deve corrispondere a una chiave di categories.yml.

items:

  #---------------------------------------------------------------------------
  # CATEGORIA TUTTI GLI OGGETTI
  #---------------------------------------------------------------------------
  # Mostra tutti gli oggetti indipendentemente dal tipo (nessun filtro).
  # Questa è la vista predefinita quando si apre la casa d'aste per la prima volta.

  all-items:
    # Tipo di pulsante per la selezione categoria.
    type: ZAUCTIONHOUSE_CATEGORY

    # Identificatore categoria - 'all' è una categoria speciale che mostra tutto.
    category: all

    # Posizione dello slot - centro della riga superiore (fuori dalla decorazione).
    slot: 4

    item:
      material: CHEST
      name: "#2CCED2<bold>ᴛᴜᴛᴛɪ ɢʟɪ ᴏɢɢᴇᴛᴛɪ"
      lore:
        - "#92ffffVedi tutti gli annunci"
        - ""
        # %zauctionhouse_category_count_all% mostra il totale degli oggetti.
        - "#92ffffTotale oggetti#8c8c8c: #2CCED2%zauctionhouse_category_count_all%"
        - ""
        - "#8c8c8c• #2CCED2Clicca #92ffffper sfogliare"

  #---------------------------------------------------------------------------
  # CATEGORIA BLOCCHI
  #---------------------------------------------------------------------------
  # Mostra solo blocchi posizionabili.

  blocks:
    type: ZAUCTIONHOUSE_CATEGORY
    # Deve corrispondere alla chiave in categories.yml
    category: blocks
    slot: 19

    item:
      # Materiale rappresentativo per questa categoria.
      material: GRASS_BLOCK
      name: "#7a7a7a<bold>ʙʟᴏᴄᴄʜɪ"
      lore:
        - "#92ffffTutti i blocchi da costruzione"
        - ""
        # Contatore dinamico degli oggetti per questa categoria.
        - "#92ffffOggetti#8c8c8c: #2CCED2%zauctionhouse_category_count_blocks%"
        - ""
        - "#8c8c8c• #2CCED2Clicca #92ffffper sfogliare"

  #---------------------------------------------------------------------------
  # CATEGORIA ARMI
  #---------------------------------------------------------------------------
  # Mostra spade, archi, balestre e altre armi.

  weapons:
    type: ZAUCTIONHOUSE_CATEGORY
    category: weapons
    slot: 20

    item:
      material: DIAMOND_SWORD
      name: "#ff5555<bold>ᴀʀᴍɪ"
      lore:
        - "#92ffffEquipaggiamento da combattimento"
        - "#92ffffSpade, archi, balestre..."
        - ""
        - "#92ffffOggetti#8c8c8c: #2CCED2%zauctionhouse_category_count_weapons%"
        - ""
        - "#8c8c8c• #2CCED2Clicca #92ffffper sfogliare"

  #---------------------------------------------------------------------------
  # CATEGORIA ARMATURE
  #---------------------------------------------------------------------------
  # Mostra elmi, corazze, gambali, stivali e scudi.

  armor:
    type: ZAUCTIONHOUSE_CATEGORY
    category: armor
    slot: 21

    item:
      material: DIAMOND_CHESTPLATE
      name: "#55ffff<bold>ᴀʀᴍᴀᴛᴜʀᴇ"
      lore:
        - "#92ffffEquipaggiamento protettivo"
        - ""
        - "#92ffffOggetti#8c8c8c: #2CCED2%zauctionhouse_category_count_armor%"
        - ""
        - "#8c8c8c• #2CCED2Clicca #92ffffper sfogliare"

  #---------------------------------------------------------------------------
  # CATEGORIA STRUMENTI
  #---------------------------------------------------------------------------
  # Mostra picconi, asce, pale, zappe e altri strumenti.

  tools:
    type: ZAUCTIONHOUSE_CATEGORY
    category: tools
    slot: 22

    item:
      material: DIAMOND_PICKAXE
      name: "#ffff55<bold>sᴛʀᴜᴍᴇɴᴛɪ"
      lore:
        - "#92ffffStrumenti di mining e agricoltura"
        - ""
        - "#92ffffOggetti#8c8c8c: #2CCED2%zauctionhouse_category_count_tools%"
        - ""
        - "#8c8c8c• #2CCED2Clicca #92ffffper sfogliare"

  #---------------------------------------------------------------------------
  # CATEGORIA CONSUMABILI
  #---------------------------------------------------------------------------
  # Mostra pozioni, cibo e altri oggetti consumabili.

  consumables:
    type: ZAUCTIONHOUSE_CATEGORY
    category: consumables
    slot: 23

    item:
      material: GOLDEN_APPLE
      name: "#55ff55<bold>ᴄᴏɴsᴜᴍᴀʙɪʟɪ"
      lore:
        - "#92ffffCibo e pozioni"
        - ""
        - "#92ffffOggetti#8c8c8c: #2CCED2%zauctionhouse_category_count_consumables%"
        - ""
        - "#8c8c8c• #2CCED2Clicca #92ffffper sfogliare"

  #---------------------------------------------------------------------------
  # CATEGORIA RISORSE
  #---------------------------------------------------------------------------
  # Mostra minerali, lingotti e materiali per il crafting.

  resources:
    type: ZAUCTIONHOUSE_CATEGORY
    category: resources
    slot: 24

    item:
      material: DIAMOND
      name: "#ffaa00<bold>ʀɪsᴏʀsᴇ"
      lore:
        - "#92ffffMinerali e materiali"
        - ""
        - "#92ffffOggetti#8c8c8c: #2CCED2%zauctionhouse_category_count_resources%"
        - ""
        - "#8c8c8c• #2CCED2Clicca #92ffffper sfogliare"

  #---------------------------------------------------------------------------
  # CATEGORIA LIBRI INCANTATI
  #---------------------------------------------------------------------------
  # Mostra solo i libri incantati.

  enchanted-books:
    type: ZAUCTIONHOUSE_CATEGORY
    category: enchanted-books
    slot: 25

    item:
      material: ENCHANTED_BOOK
      name: "#ff55ff<bold>ʟɪʙʀɪ ɪɴᴄᴀɴᴛᴀᴛɪ"
      lore:
        - "#92ffffLibri con incantamenti"
        - ""
        - "#92ffffOggetti#8c8c8c: #2CCED2%zauctionhouse_category_count_enchanted-books%"
        - ""
        - "#8c8c8c• #2CCED2Clicca #92ffffper sfogliare"

  #---------------------------------------------------------------------------
  # CATEGORIA VARIE
  #---------------------------------------------------------------------------
  # Mostra gli oggetti che non rientrano nelle altre categorie.

  misc:
    type: ZAUCTIONHOUSE_CATEGORY
    category: misc
    slot: 31

    item:
      material: CHEST
      name: "#555555<bold>ᴠᴀʀɪᴇ"
      lore:
        - "#92ffffAltri oggetti"
        - ""
        - "#92ffffOggetti#8c8c8c: #2CCED2%zauctionhouse_category_count_misc%"
        - ""
        - "#8c8c8c• #2CCED2Clicca #92ffffper sfogliare"

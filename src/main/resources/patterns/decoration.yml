################################################################################################################################
#
#   zAuctionHouse V4 - Decoration Pattern
#
#   This pattern file provides decorative glass panes for inventory borders.
#   It is reused across multiple inventories to maintain consistent styling.
#
#   HOW PATTERNS WORK:
#   - Patterns are reusable inventory templates
#   - They can be included in any inventory using the 'patterns' list
#   - Multiple patterns can be combined in a single inventory
#   - Items from patterns can be overridden by the including inventory
#
#   USAGE:
#   Include this pattern in your inventory files:
#     patterns:
#       - 'zauctionhouse-decoration'
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

# Pattern name - referenced in other inventory files.
# Must be unique across all pattern files.
name: "zauctionhouse-decoration"

# Inventory size (must match the inventories using this pattern).
# Standard sizes: 9, 18, 27, 36, 45, 54
# This pattern is designed for 6-row (54 slot) inventories.
size: 54

# Items in this pattern.
# These are placed in the inventory when the pattern is applied.
items:

  # Decorative glass pane border
  decoration:
    # When true, this item cannot be moved or taken by players.
    # Always use is-permanent: true for decoration items.
    is-permanent: true

    # Slots where this item appears.
    # Slot ranges: '0-8' means slots 0, 1, 2, 3, 4, 5, 6, 7, 8
    # This creates a top and bottom border.
    #
    # SLOT LAYOUT (54 slot inventory):
    # Row 1 (top):    0  1  2  3  4  5  6  7  8
    # Row 2:          9 10 11 12 13 14 15 16 17
    # Row 3:         18 19 20 21 22 23 24 25 26
    # Row 4:         27 28 29 30 31 32 33 34 35
    # Row 5:         36 37 38 39 40 41 42 43 44
    # Row 6 (bottom): 45 46 47 48 49 50 51 52 53
    slots:
      - '0-8'     # Top row (9 slots)
      - '45-53'   # Bottom row (9 slots)

    # Item configuration
    item:
      # Material type - use STAINED_GLASS_PANE variants for decoration.
      # Available colors: WHITE, ORANGE, MAGENTA, LIGHT_BLUE, YELLOW, LIME,
      # PINK, GRAY, LIGHT_GRAY, CYAN, PURPLE, BLUE, BROWN, GREEN, RED, BLACK
      material: LIGHT_BLUE_STAINED_GLASS_PANE

      # Item name - set to a color code only to make it appear blank.
      # Using just "<white>" hides the name while preventing the default name.
      name: "<white>"

# Permet de définir l'item qui sera affiché si pour un item en vente il y a plusieurs items
special-items:
  auction-item:
    material: CHEST
    name: "#00ff00Bulk sale"

item-display:
  lang: "#8ee6e3x%amount% &7<lang:%item-translation-key%>"
  item-name: "#8ee6e3x%amount% &7%item-name%"
  and: " &fand "
  between: "&f, "
  merge-similar-items: true

time: # ---- Unités (singulier / pluriel) ----
  second: second
  seconds: seconds
  
  minute: minute
  minutes: minutes
  
  hour: hour
  hours: hours
  
  day: day
  days: days

  # ---- Formats de temps ----
  # %02d = valeur numérique (jours / heures / minutes / secondes)
  # %second%, %minute%, %hour%, %day% = unité adaptée en fonction du quantificateur
  # Exemple : "1 day", "2 days", "01ᴅ 02ʜ 30ᴍ", etc.

  # Format utilisé pour les durées >= 1 jour
  time-day: '%02dᴅ %02dʜ %02dᴍ'
  
  # Format utilisé pour les durées >= 1 heure, mais < 1 jour
  time-hour: '%02dʜ %02dᴍ %02ds'
  
  # Format utilisé pour les durées >= 1 minute, mais < 1 heure
  time-minute: '%02dᴍ %02ds'
  
  # Format utilisé pour les durées < 1 minute
  time-second: '%02ds'

action:

  # Permet de mettre à jour l'inventaire des items en vente lorsqu'un item est ajouté ou retiré de la vente
  update-inventory-on-action: true

  remove-listed-item: # On donne l'item après avoir retiré l'item de la vente
    give-item: false
    
    # On ouvre l'inventaire après l'avoir retiré
    open-inventory: true

    # Permet d'ouvrir l'inventaire de confirmation
    open-confirm-inventory: true
  
  remove-expired-item:
    
    # On ouvre l'inventaire après l'avoir retiré
    open-inventory: true
  
  purchased-item:

    # On donne l'item après l'achat
    give-item: false

    # Si l'option give item est active, alors cette option va vérifier le contenu de l'inventaire du joueur et vérifier s'il a assez de place pour recevoir le ou les objets.
    player-inventory-must-have-free-space: true

    # On ouvre l'inventaire après l'avoir retiré de l'inventaire des items acheté
    open-inventory: true

    # On affiche un item d'erreur
    money-item:
      enable: true # Activé / désactivé
      duration: 60 # Durée en ticks
      item: # Item à afficher
        material: BARRIER
        name: "#ff3535✘ You don't have enough money to buy this!"

    # Envoie un message si le joueur n'a pas assez d'argent
    money-message: true

    money-sound:
      enable: true
      category: MASTER
      sound: minecraft:entity.villager.no
      volume: 1
      pitch: 1

  owned-item:

    # On ouvre l'inventaire après l'avoir retiré de l'inventaire de mes items
    open-inventory: true

# Système de tri
# Configuration for automatic money claiming
# When a player sells an item and the buyer is offline, the money is stored as "pending"
# This configuration controls how pending money is handled
auto-claim:
  # If true, pending money will be automatically given to the player when they join
  enable: false

  # Delay in ticks before auto-claiming on join (20 ticks = 1 second)
  # Set to 0 for immediate claim
  delay-ticks: 20

  # If true, a message will be sent when money is auto-claimed
  notify-player: true

  # If auto-claim is disabled, this option will notify the player about pending money on join
  notify-pending: true

  # Delay in ticks before sending the notification about pending money
  notify-delay-ticks: 40

  # The reason shown in the economy transaction when depositing money
  # This is typically displayed in economy plugins or transaction logs
  deposit-reason: "Claimed pending auction money"

# Configuration for sales notification on player join
# Notifies players about items they sold while offline
sales-notification:
  # If true, players will be notified about sales made while they were offline
  enable: true

  # Delay in ticks before sending the notification (20 ticks = 1 second)
  delay-ticks: 60

sort-items:

  # Tri par défaut
  default-sort: DECREASING_DATE

  translations:
    ASCENDING_PRICE: "ᴀsᴄᴇɴᴅɪɴɢ ᴘʀɪᴄᴇ"
    ASCENDING_DATE: "ᴀsᴄᴇɴᴅɪɴɢ ᴅᴀᴛᴇ"
    DECREASING_DATE: "ᴅᴇᴄʀᴇᴀsɪɴɢ ᴅᴀᴛᴇ"
    DECREASING_PRICE: "ᴅᴇᴄʀᴇᴀsɪɴɢ ᴘʀɪᴄᴇ"

# Enables detailed logs and error messages in the console.
# If you need support, make sure to activate this option and check your console logs.
enable-debug: false

# Enables performance monitoring and logging.
# When enabled, the plugin will log execution times for heavy operations like:
# - Item sorting and filtering
# - Category matching
# - Database loading
# - Cache operations
# Useful for diagnosing performance issues with large auction houses.
enable-performance-debug: false

# Performance debug filter configuration
# Allows you to whitelist or blacklist specific operation names
performance-debug:
  filter:
    # Filter mode: DISABLED (log all), WHITELIST (only log listed), BLACKLIST (log all except listed)
    mode: DISABLED
    # List of operation names to filter
    # Supports wildcard suffix (*) for prefix matching, e.g., "loadItems.*" matches all loadItems operations
    # Available operations:
    # - loadItems.loadPlayers, loadItems.loadItemsFromDB, loadItems.loadAuctionItemsFromDB
    # - loadItems.processItems, loadItems.total, loadItems.rebuildSortedItemsCache
    # - getItemsListedForSale, resolveItems[SALE], getItemIds[SALE]
    # - applyCategories, computeCategoryCount[categoryId]
    # - SortedItemsCache.rebuild, item.BuildItemStack, item.CreatePlaceholders
    # - openInventory.<file name>
    operations:
      - "loadItems.*"
      - "SortedItemsCache.*"

date-format: dd/MM/yyyy HH:mm:ss

#
# - SQLITE
# - MARIADB
# - MYSQL
storage-type: SQLITE

# Nom du serveur pour identifier l'origine des ventes dans le cadre d'une gestion multi-serveur.
server-name: skyblock

# Database configuration.
# It is strongly recommended to use a database to store all plugin data.
database-configuration: # Prefix applied to all tables created by the plugin.
  # If you use the same database for multiple plugins, this helps avoid conflicts.
  # It is recommended not to change this value once the plugin is in use.
  table-prefix: zauctionhouse_
  # IP address of the machine hosting your database.
  host: 192.168.10.10
  # Port of your database server.
  # Default MySQL port: 3306
  port: 3306
  # Username used to log into the database.
  user: homestead
  # Password associated with the database user.
  password: secret
  # Name of the database where data will be stored.
  database: zauctionhouse
  # Enables SQL debugging.
  # Activates verbose SQL logs, useful for identifying database issues.
  debug: true

# Il vous permet de définir des clés qui seront remplacées par la couleur pour vos messages.
# Cela permet de simplifier la configuration de vos messages
message-colors:
  - key: <primary>
    color: '#24d65d'
  - key: <secondary>
    color: '#656665'
  - key: <error>
    color: '#ff0000'
  - key: <success>
    color: '#00ff00'

# Configuration des commandes, aliases, arguments
# Pour reload cette configuration, vous devez relancer votre serveur !
commands: # Commande principale, /zauctionhouse
  main-command: # Aliases de la commande principale
    aliases:
      - ah
      - hdv
      - auction
      - zauction

  # Commande de vente /zauctionhouse sell
  sell:
    aliases:
      - sell
      - s
      - vendre
    arguments:
      - name: price
        display-name: price
        required: true
        auto-completion:
          - 1000
          - 10000
          - 25000
      - name: amount
        display-name: amount
        required: false
        auto-completion:
          - '1'
          - '%max-stack-size%'
      - name: economy
        display-name: economy
        required: false
        auto-completion:
          - vault

  sell-inventory:
    aliases:
      - sellinventory
      - si
      - sellinv
    arguments:
      - name: price
        display-name: price
        required: true
        auto-completion:
          - 1000
          - 10000
          - 25000
      - name: economy
        display-name: economy
        required: false
        auto-completion:
          - vault

number-sell-multiplication:
  enable: true
  formats:
    - format: K
      multiplication: 1000
    - format: M
      multiplication: 1000000
    - format: B
      multiplication: 1000000000
    - format: T
      multiplication: 1000000000000
    - format: Q
      multiplication: 1000000000000000
    - format: QQ
      multiplication: 1000000000000000000
    - format: S
      multiplication: 1000000000000000000000
    - format: SS
      multiplication: 1000000000000000000000000
    - format: O
      multiplication: 1000000000000000000000000000
    - format: N
      multiplication: 1000000000000000000000000000000
    - format: D
      multiplication: 1000000000000000000000000000000000
    - format: UN
      multiplication: 1000000000000000000000000000000000000
    - format: DD
      multiplication: 1000000000000000000000000000000000000000
    - format: TR
      multiplication: 1000000000000000000000000000000000000000000

expiration:
  auction: # Le default permission doit être la valeur la plus petite
    default-expiration: 172800
    permission:
      enable: false
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600
        - permission: zauctionhouse.expiration.elite
          expiration: 7200
        - permission: zauctionhouse.expiration.legend
          expiration: 259200

  bid:
    default-expiration: 172800
    permission:
      enable: false
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600
        - permission: zauctionhouse.expiration.elite
          expiration: 7200
        - permission: zauctionhouse.expiration.legend
          expiration: 259200

  rent:
    default-expiration: 172800
    permission:
      enable: false
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600
        - permission: zauctionhouse.expiration.elite
          expiration: 7200
        - permission: zauctionhouse.expiration.legend
          expiration: 259200

  expire:
    default-expiration: 604800
    permission:
      enable: false

  purchase:
    default-expiration: 604800
    permission:
      enable: false

# Permission pour le nombre maximum d'item qu'un joueur peut vendre
permissions:
  auction:
    - permission: zauctionhouse.max.5
      limit: 5
    - permission: zauctionhouse.max.10
      limit: 10
    - permission: zauctionhouse.max.15
      limit: 15
  rent:
    - permission: zauctionhouse.max.5
      limit: 5
    - permission: zauctionhouse.max.10
      limit: 10
    - permission: zauctionhouse.max.15
      limit: 15
  bid:
    - permission: zauctionhouse.max.5
      limit: 5
    - permission: zauctionhouse.max.10
      limit: 10
    - permission: zauctionhouse.max.15
      limit: 15


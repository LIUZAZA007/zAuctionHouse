time:
  # ---- Unit√©s (singulier / pluriel) ----
  second: "second"
  seconds: "seconds"

  minute: "minute"
  minutes: "minutes"

  hour: "hour"
  hours: "hours"

  day: "day"
  days: "days"

  # ---- Formats de temps ----
  # %02d = valeur num√©rique (jours / heures / minutes / secondes)
  # %second%, %minute%, %hour%, %day% = unit√© adapt√©e en fonction du quantificateur
  # Exemple : "1 day", "2 days", "01ŠīÖ 02 ú 30Šīć", etc.

  # Format utilis√© pour les dur√©es >= 1 jour
  time-day: "%02dŠīÖ %02d ú %02dŠīć"

  # Format utilis√© pour les dur√©es >= 1 heure, mais < 1 jour
  time-hour: "%02d ú %02dŠīć %02ds"

  # Format utilis√© pour les dur√©es >= 1 minute, mais < 1 heure
  time-minute: "%02dŠīć %02ds"

  # Format utilis√© pour les dur√©es < 1 minute
  time-second: "%02ds"


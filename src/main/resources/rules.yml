    # CraftEngine - Block specific CraftEngine items
    # - type: craftengine
    #   items:
    #     - "namespace:custom_block"
    #     - "namespace:*"  # Wildcard: all items from namespace

    # ExecutableBlocks - Block specific ExecutableBlocks
    # - type: executableblocks
    #   items:
    #     - "magic_chest"
    #     - "teleporter_*"  # Wildcard

# Whitelist - Only items matching these rules can be sold (if enabled)
whitelist:
  enabled: false
  rules:
    # Allow only Nether Stars with "Voucher" in name
    - type: and
      rules:
        - type: material
          materials:
            - NETHER_STAR
        - type: name
          mode: CONTAINS
          values:
            - "Voucher"

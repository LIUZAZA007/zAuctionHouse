# Blacklist - Items matching these rules cannot be sold
blacklist:
  enabled: true
  rules:
    # Block bedrock
    - type: material
      materials:
        - BEDROCK

    # Block items with "Untradeable" in lore AND specific model data
    - type: and
      rules:
        - type: lore
          mode: CONTAINS
          values:
            - "Untradeable"
        - type: custom-model-data
          values:
            - 1001

# Whitelist - Only items matching these rules can be sold (if enabled)
whitelist:
  enabled: false
  rules:
    # Allow only Nether Stars with "Voucher" in name
    - type: and
      rules:
        - type: material
          materials:
            - NETHER_STAR
        - type: name
          mode: CONTAINS
          values:
            - "Voucher"

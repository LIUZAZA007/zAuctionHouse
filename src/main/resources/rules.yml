# Blacklist - Items matching these rules cannot be sold
blacklist:
  enabled: true
  rules:
    # Block bedrock
    - type: material
      materials:
        - BEDROCK

    # Block items with "Untradeable" in lore AND specific model data
    - type: and
      rules:
        - type: lore
          mode: CONTAINS
          values:
            - "Untradeable"
        - type: custom-model-data
          values:
            - 1001

    # ==========================================
    # Custom Items Plugin Rules (Examples)
    # ==========================================
    # Uncomment and modify these examples to use

    # ItemsAdder - Block specific ItemsAdder items
    # - type: itemsadder
    #   items:
    #     - "namespace:item_id"
    #     - "namespace:*"  # Wildcard: all items from namespace

    # Oraxen - Block specific Oraxen items
    # - type: oraxen
    #   items:
    #     - "custom_sword"
    #     - "*_armor"  # Wildcard: all items ending with _armor

    # Nexo - Block specific Nexo items
    # - type: nexo
    #   items:
    #     - "mythic_blade"
    #     - "special_*"  # Wildcard: all items starting with special_

    # MMOItems - Block specific MMOItems (format: TYPE:ID or just ID)
    # - type: mmoitems
    #   items:
    #     - "SWORD:CUTLASS"
    #     - "SWORD:*"  # Wildcard: all swords
    #     - "*:LEGENDARY_ITEM"  # Wildcard: any type with this ID

    # ExecutableItems - Block specific ExecutableItems
    # - type: executableitems
    #   items:
    #     - "custom_wand"
    #     - "voucher_*"  # Wildcard

    # EcoItems - Block specific EcoItems
    # - type: ecoitems
    #   items:
    #     - "packmaster_tear"
    #     - "charm_*"  # Wildcard

    # MythicCrucible - Block specific Crucible items
    # - type: crucible
    #   items:
    #     - "mythic_blade"
    #     - "dungeon_*"  # Wildcard

    # Slimefun - Block specific Slimefun items
    # - type: slimefun
    #   items:
    #     - "ELECTRIC_MOTOR"
    #     - "*_INGOT"  # Wildcard: all ingots

    # HeadDatabase - Block specific HeadDatabase heads
    # - type: headdatabase
    #   items:
    #     - "12345"
    #     - "123*"  # Wildcard

    # Nova - Block specific Nova items
    # - type: nova
    #   items:
    #     - "machines:electric_furnace"
    #     - "machines:*"  # Wildcard: all items from machines addon

    # Denizen - Block specific Denizen scripted items
    # - type: denizen
    #   items:
    #     - "my_custom_script"
    #     - "*_weapon"  # Wildcard

    # AdvancedItems - Block specific AdvancedItems
    # - type: advanceditems
    #   items:
    #     - "magic_staff"
    #     - "rpg_*"  # Wildcard

    # CustomCrafting/WolfyUtilities - Block specific custom items
    # - type: customcrafting
    #   items:
    #     - "mynamespace:custom_item"
    #     - "mynamespace:*"  # Wildcard

    # zHead - Block specific zHead heads
    # - type: zhead
    #   items:
    #     - "custom_head_id"
    #     - "category_*"  # Wildcard

    # MagicCosmetics - Block specific MagicCosmetics items
    # - type: magiccosmetics
    #   items:
    #     - "hat_crown"
    #     - "backpack_*"  # Wildcard

    # HMCCosmetics - Block specific HMCCosmetics items
    # - type: hmccosmetics
    #   items:
    #     - "golden_wings"
    #     - "aura_*"  # Wildcard

    # zItems - Block specific zItems items

#=============================================================================
# RACCOURCIS DE PRIX
#=============================================================================

# Raccourcis de multiplication pour les commandes de vente.
# Permet aux joueurs d'utiliser une notation abr√©g√©e pour les grands nombres.
# Exemple: /ah sell 1K = /ah sell 1000
# Exemple: /ah sell 2.5M = /ah sell 2500000
number-sell-multiplication:
  # Activer ou d√©sactiver cette fonctionnalit√©
  enable: true

  # D√©finitions de format (insensible √† la casse)
  # Les joueurs tapent le suffixe 'format', et le prix est multipli√© par 'multiplication'.
  formats:
    - format: K          # Millier (1 000)
      multiplication: 1000
    - format: M          # Million (1 000 000)
      multiplication: 1000000
    - format: B          # Milliard (1 000 000 000)
      multiplication: 1000000000
    - format: T          # Billion
      multiplication: 1000000000000
    - format: Q          # Billiard
      multiplication: 1000000000000000
    - format: QQ         # Trillion
      multiplication: 1000000000000000000
    - format: S          # Trilliard
      multiplication: 1000000000000000000000
    - format: SS         # Quadrillion
      multiplication: 1000000000000000000000000
    - format: O          # Quadrilliard
      multiplication: 1000000000000000000000000000
    - format: N          # Quintillion
      multiplication: 1000000000000000000000000000000
    - format: D          # Quintilliard
      multiplication: 1000000000000000000000000000000000
    - format: UN         # Sextillion
      multiplication: 1000000000000000000000000000000000000
    - format: DD         # Sextilliard
      multiplication: 1000000000000000000000000000000000000000
    - format: TR         # Septillion
      multiplication: 1000000000000000000000000000000000000000000

#=============================================================================
# PARAM√ąTRES D'EXPIRATION
#=============================================================================

# Temps d'expiration pour les diff√©rents √©tats d'items.
# Tous les temps sont en SECONDES.
# Valeurs courantes:
#   3600    = 1 heure
#   86400   = 1 jour
#   172800  = 2 jours
#   259200  = 3 jours
#   604800  = 1 semaine
#   2592000 = 30 jours

expiration:
  # Dur√©e des annonces avant expiration.
  auction:
    # Temps d'expiration par d√©faut en secondes (172800 = 2 jours)
    # Apr√®s ce temps, les items non vendus vont dans la section "items expir√©s".
    default-expiration: 172800

    # Temps d'expiration bas√©s sur les permissions.
    # Les joueurs avec des permissions sp√©cifiques peuvent avoir des dur√©es diff√©rentes.
    permission:
      # Activer ou d√©sactiver l'expiration bas√©e sur les permissions
      enable: false
      # Liste des permissions (v√©rifi√©es dans l'ordre, premi√®re correspondance utilis√©e)
      # IMPORTANT: Ordonner de la plus basse √† la plus haute priorit√©
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600       # 1 heure
        - permission: zauctionhouse.expiration.elite
          expiration: 7200       # 2 heures
        - permission: zauctionhouse.expiration.legend
          expiration: 259200     # 3 jours

  # Dur√©e des annonces d'ench√®res (fonctionnalit√© future).
  bid:
    default-expiration: 172800
    permission:
      enable: false
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600
        - permission: zauctionhouse.expiration.elite
          expiration: 7200
        - permission: zauctionhouse.expiration.legend
          expiration: 259200

  # Dur√©e des annonces de location (fonctionnalit√© future).
  rent:
    default-expiration: 172800
    permission:
      enable: false
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600
        - permission: zauctionhouse.expiration.elite
          expiration: 7200
        - permission: zauctionhouse.expiration.legend
          expiration: 259200

  # Dur√©e de conservation des items expir√©s avant suppression d√©finitive.
  # Apr√®s ce temps, les items expir√©s non r√©cup√©r√©s sont d√©finitivement perdus.
  # Recommand√©: Au moins 1 semaine pour donner aux joueurs le temps de r√©cup√©rer leurs items.
  expire:
    default-expiration: 604800   # 1 semaine
    permission:
      enable: false

  # Dur√©e de conservation des items achet√©s avant suppression d√©finitive.
  # Apr√®s ce temps, les items achet√©s non r√©cup√©r√©s sont d√©finitivement perdus.
  # Recommand√©: Au moins 1 semaine pour donner aux joueurs le temps de r√©cup√©rer leurs items.
  purchase:
    default-expiration: 604800   # 1 semaine
    permission:
      enable: false


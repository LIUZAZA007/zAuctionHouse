#=============================================================================
# PARAM√ąTRES DE D√ČBOGAGE ET SURVEILLANCE
#=============================================================================

# Active les logs d√©taill√©s et messages d'erreur dans la console.
# Utilisez ceci lors du d√©pannage ou quand le support demande des infos de d√©bogage.
# Quand activ√©, le plugin affiche des informations d√©taill√©es sur les op√©rations.
# Recommand√©: Garder d√©sactiv√© en production, activer uniquement pour les investigations.
enable-debug: false

# Active la surveillance et les logs de performance.
# Quand activ√©, le plugin enregistre les temps d'ex√©cution des op√©rations lourdes:
# - Tri et filtrage des items
# - Correspondance et comptage des cat√©gories
# - Chargement et requ√™tes de base de donn√©es
# - Op√©rations de cache et reconstructions
# Utile pour diagnostiquer les probl√®mes de performance avec de grands h√ītels des ventes (1000+ items).
# Recommand√©: Activer temporairement lors de lags ou chargements d'inventaire lents.
enable-performance-debug: false

# Active la v√©rification automatique de version par rapport √† la derni√®re release.
# Quand activ√©, le plugin notifie la console/admins si une nouvelle version est disponible.
# Ceci ne met PAS √† jour automatiquement le plugin, affiche uniquement une notification.
# Recommand√©: Garder activ√© pour √™tre inform√© des mises √† jour importantes et corrections de bugs.
enable-version-checker: true

# Configuration du filtre de d√©bogage de performance.
# Permet de se concentrer sur des op√©rations sp√©cifiques en filtrant lesquelles sont enregistr√©es.
# Pertinent uniquement quand 'enable-performance-debug' est √† true.
performance-debug:
  filter:
    # Options du mode de filtre:
    # - DISABLED: Enregistrer toutes les op√©rations (par d√©faut, pas de filtrage)
    # - WHITELIST: Enregistrer uniquement les op√©rations list√©es dans 'operations'
    # - BLACKLIST: Enregistrer toutes les op√©rations SAUF celles list√©es dans 'operations'
    mode: DISABLED

    # Liste des noms d'op√©rations √† filtrer.
    # Supporte le suffixe joker (*) pour la correspondance par pr√©fixe.
    # Exemple: "loadItems.*" correspond √† loadItems.loadPlayers, loadItems.loadItemsFromDB, etc.
    #
    # Noms d'op√©rations disponibles:
    # Op√©rations de chargement:
    #   - loadItems.loadPlayers        : Temps pour charger les donn√©es joueurs
    #   - loadItems.loadItemsFromDB    : Temps pour charger les items de la BDD
    #   - loadItems.loadAuctionItemsFromDB : Temps pour charger les items d'ench√®res
    #   - loadItems.processItems       : Temps pour traiter les items charg√©s
    #   - loadItems.total              : Temps total de chargement
    #   - loadItems.rebuildSortedItemsCache : Temps pour reconstruire le cache tri√©
    #
    # Op√©rations de cache:
    #   - SortedItemsCache.rebuild     : Temps pour reconstruire le cache d'items tri√©s
    #   - getItemsListedForSale        : Temps pour r√©cup√©rer les items en vente
    #   - resolveItems[SALE]           : Temps pour r√©soudre les items de vente
    #   - getItemIds[SALE]             : Temps pour obtenir les IDs d'items en vente
    #
    # Op√©rations de cat√©gorie:
    #   - applyCategories              : Temps pour appliquer les filtres de cat√©gorie
    #   - computeCategoryCount[categoryId] : Temps pour compter les items par cat√©gorie
    #
    # Op√©rations d'item:
    #   - item.BuildItemStack          : Temps pour construire les ItemStacks pour l'affichage
    #   - item.CreatePlaceholders      : Temps pour cr√©er les placeholders d'item
    #
    # Op√©rations d'inventaire:
    #   - openInventory.<nom fichier>  : Temps pour ouvrir un inventaire sp√©cifique
    operations:
      - "loadItems.*"
      - "SortedItemsCache.*"


#=============================================================================
# COMPORTEMENT DES ACTIONS
#=============================================================================

# Configuration du comportement des diff√©rentes actions dans le plugin.
# Contr√īle ce qui se passe apr√®s les achats, retraits et autres op√©rations.

action:
  # Quand activ√©, l'inventaire d'ench√®res se rafra√ģchit automatiquement lors d'ajouts/suppressions d'items.
  # D√©sactiver si vous rencontrez des probl√®mes de performance avec des mises √† jour fr√©quentes.
  update-inventory-on-action: true

  # Comportement lors du retrait d'un item des annonces actives (le vendeur annule sa vente)
  remove-listed-item:

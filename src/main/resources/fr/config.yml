  # ATTENTION: Ne changez pas apr√®s que le plugin ait stock√© des donn√©es, sinon elles seront perdues.
  # Tables cr√©√©es par d√©faut: {prefix}items, {prefix}auction_items, {prefix}players, etc.
  table-prefix: zauctionhouse_


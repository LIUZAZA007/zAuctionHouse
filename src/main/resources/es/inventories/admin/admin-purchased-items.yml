################################################################################################################################
#
#   zAuctionHouse V4 - Inventario Objetos Comprados Admin
#
#   Este inventario permite a los administradores ver y gestionar los objetos comprados de un jugador.
#   Los administradores pueden recuperar objetos en nombre de jugadores que podrian haber perdido acceso.
#
#   ACCIONES ADMIN:
#   - Ver todos los objetos comprados del jugador objetivo
#   - Recuperar objetos para devolver al jugador
#   - Util para recuperar objetos despues de reclamaciones de jugadores
#
#   ACCESO:
#   - Desde el menu principal historial admin -> Boton Objetos Comprados
#   - /ah admin open purchased <jugador>
#
#   Documentacion: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# CONFIGURACION DEL INVENTARIO
#=============================================================================

# Titulo del inventario con placeholder de paginacion.
name: '#0c1719Objetos comprados admin (%page%/%max-page%)'

# Tamano del inventario - 6 filas.
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # Bordes decorativos de cristal.
  - 'zauctionhouse-decoration'
  # Botones pagina anterior/siguiente.
  - 'zauctionhouse-pagination'
  # Boton atras para volver al historial admin.
  - 'zauctionhouse-back'

#=============================================================================
# OBJETOS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # VISUALIZACION DE OBJETOS COMPRADOS
  #---------------------------------------------------------------------------
  # Muestra todos los objetos comprados del jugador objetivo.
  # Al hacer clic en un objeto lo recupera (accion admin).

  items:
    # Tipo de boton - visualiza objetos comprados admin con funcionalidad de recuperacion.
    type: ZAUCTIONHOUSE_ADMIN_PURCHASED_ITEMS

    # Slots para mostrar los objetos comprados (4 filas x 9 columnas = 36 slots).
    slots:
      - 9-17    # Fila 2
      - 18-26   # Fila 3
      - 27-35   # Fila 4
      - 36-44   # Fila 5

    # Fallback cuando no hay objetos comprados.
    else:
      slots:
        - 22
      item:
        material: BARRIER
        name: '#ff0000&nNingun Objeto Encontrado'

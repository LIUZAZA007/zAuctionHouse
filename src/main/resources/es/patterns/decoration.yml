################################################################################################################################
#
#   zAuctionHouse V4 - Patrón de Decoración
#
#   Este archivo de patrón proporciona paneles de vidrio decorativos para los bordes del inventario.
#   Se reutiliza en múltiples inventarios para mantener un estilo consistente.
#
#   CÓMO FUNCIONAN LOS PATRONES:
#   - Los patrones son plantillas de inventario reutilizables
#   - Pueden incluirse en cualquier inventario usando la lista 'patterns'
#   - Varios patrones pueden combinarse en un solo inventario
#   - Los elementos de los patrones pueden ser sobrescritos por el inventario que los incluye
#
#   USO:
#   Incluye este patrón en tus archivos de inventario:
#     patterns:
#       - 'zauctionhouse-decoration'
#
#   Documentación: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

# Nombre del patrón - referenciado en otros archivos de inventario.
# Debe ser único entre todos los archivos de patrón.
name: "zauctionhouse-decoration"

# Tamaño del inventario (debe coincidir con los inventarios que usan este patrón).
# Tamaños estándar: 9, 18, 27, 36, 45, 54
# Este patrón está diseñado para inventarios de 6 filas (54 slots).
size: 54

# Elementos en este patrón.
# Se colocan en el inventario cuando se aplica el patrón.
items:

  # Borde de paneles de vidrio decorativos
  decoration:
    # Cuando es true, este elemento no puede ser movido o tomado por los jugadores.
    # Siempre usa is-permanent: true para elementos decorativos.
    is-permanent: true

    # Slots donde aparece este elemento.
    # Rangos de slots: '0-8' significa slots 0, 1, 2, 3, 4, 5, 6, 7, 8
    # Esto crea un borde superior e inferior.
    #
    # DISPOSICIÓN DE SLOTS (inventario 54 slots):
    # Fila 1 (arriba):  0  1  2  3  4  5  6  7  8
    # Fila 2:           9 10 11 12 13 14 15 16 17
    # Fila 3:          18 19 20 21 22 23 24 25 26
    # Fila 4:          27 28 29 30 31 32 33 34 35
    # Fila 5:          36 37 38 39 40 41 42 43 44
    # Fila 6 (abajo):  45 46 47 48 49 50 51 52 53
    slots:
      - '0-8'     # Fila superior (9 slots)
      - '45-53'   # Fila inferior (9 slots)

    # Configuración del elemento
    item:
      # Tipo de material - usa las variantes STAINED_GLASS_PANE para decoración.
      # Colores disponibles: WHITE, ORANGE, MAGENTA, LIGHT_BLUE, YELLOW, LIME,
      # PINK, GRAY, LIGHT_GRAY, CYAN, PURPLE, BLUE, BROWN, GREEN, RED, BLACK
      material: LIGHT_BLUE_STAINED_GLASS_PANE

      # Nombre del elemento - establecido solo con un código de color para dejarlo vacío.
      # Usar solo "<white>" oculta el nombre mientras evita el nombre predeterminado.
      name: "<white>"

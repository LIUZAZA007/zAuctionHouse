################################################################################################################################
#
#   zAuctionHouse V4 - Admin Purchased Items Inventory
#
#   This inventory allows admins to view and manage a player's purchased items.
#   Admins can retrieve items on behalf of players who may have lost access.
#
#   ADMIN ACTIONS:
#   - View all purchased items for the target player
#   - Retrieve items to give back to the player
#   - Useful for recovering items after player complaints
#
#   ACCESS:
#   - From admin history main menu → Purchased Items button
#   - /ah admin open purchased <player>
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

# Inventory title with pagination placeholders.
name: '#0c1719Admin purchased items (%page%/%max-page%)'

# Inventory size - 6 rows.
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # Decorative glass pane borders.
  - 'zauctionhouse-decoration'
  # Previous/next page buttons.
  - 'zauctionhouse-pagination'
  # Back button to return to admin history main.
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # PURCHASED ITEMS DISPLAY
  #---------------------------------------------------------------------------
  # Shows all purchased items for the target player.
  # Clicking an item retrieves it (admin action).

  items:
    # Button type - displays admin purchased items with retrieval functionality.
    type: ZAUCTIONHOUSE_ADMIN_PURCHASED_ITEMS

    # Slots for displaying purchased items (4 rows × 9 columns = 36 slots).
    slots:
      - 9-17    # Row 2
      - 18-26   # Row 3
      - 27-35   # Row 4
      - 36-44   # Row 5

    # Fallback when no purchased items exist.
    else:
      slots:
        - 22
      item:
        material: BARRIER
        name: '#ff0000&nNo Items Found'

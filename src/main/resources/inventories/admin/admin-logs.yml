################################################################################################################################
#
#   zAuctionHouse V4 - Admin Logs Inventory
#
#   This inventory displays all action logs for a player.
#   Logs record every auction action: listing, purchasing, and removing items.
#
#   LOG TYPES:
#   - SALE: Item was listed for sale
#   - PURCHASE: Item was purchased
#   - REMOVE_LISTED: Item was removed from active listing
#   - REMOVE_SELLING: Item was retrieved from selling inventory
#   - REMOVE_EXPIRED: Item was retrieved from expired inventory
#   - REMOVE_PURCHASED: Item was retrieved from purchased inventory
#
#   FEATURES:
#   - Filter by log type
#   - Filter by date range
#   - Retrieve items from log entries (admin recovery)
#
#   ACCESS:
#   - From admin history main menu → Logs button
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

# Inventory title with pagination placeholders.
name: '#0c1719Admin logs (%page%/%max-page%)'

# Inventory size - 6 rows.
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # Decorative glass pane borders.
  - 'zauctionhouse-decoration'
  # Previous/next page buttons.
  - 'zauctionhouse-pagination'
  # Back button to return to admin history main.
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # LOG ENTRIES DISPLAY
  #---------------------------------------------------------------------------
  # Shows all log entries for the target player.
  # Each entry shows the action type, item, and timestamp.

  items:
    # Button type - displays log entries.
    type: ZAUCTIONHOUSE_ADMIN_LOGS

    # Slot for loading indicator.
    loading-slot: 22

    # Slots for displaying log entries (4 rows × 9 columns = 36 slots).
    slots:
      - 9-17    # Row 2
      - 18-26   # Row 3
      - 27-35   # Row 4
      - 36-44   # Row 5

    # Item shown while loading logs.
    item:
      material: BARRIER
      name: "#ff0000Loading..."

    # Item shown when no logs exist.
    else:
      slots:
        - 22
      item:
        material: BARRIER
        name: '#ff0000&nNo Sales Found'
        lore:
          - ''
          - '&7You have not sold any items yet.'

  #---------------------------------------------------------------------------
  # FILTER BY TYPE BUTTON
  #---------------------------------------------------------------------------
  # Cycles through log type filters.

  filter-type:
    # Button type - handles type filtering.
    type: ZAUCTIONHOUSE_ADMIN_LOGS_FILTER_TYPE

    # Slot position.
    slot: 47

    # Format for currently selected type.
    enable-text: ' #F27438➜ %type%'

    # Format for unselected types.
    disable-text: ' #76CDCD➜ %type%'

    # Display name for "all types" option.
    all-types-name: "All"

    # Available log types to filter by.
    types:
      - SALE              # Items listed for sale
      - PURCHASE          # Items purchased
      - REMOVE_LISTED     # Items removed from active listings
      - REMOVE_SELLING    # Items retrieved from selling inventory
      - REMOVE_EXPIRED    # Items retrieved from expired inventory
      - REMOVE_PURCHASED  # Items retrieved from purchased inventory

    # Display names for each type.
    type-names:
      SALE: "Sale"
      PURCHASE: "Purchase"
      REMOVE_LISTED: "Remove Listed"
      REMOVE_SELLING: "Remove Owned"
      REMOVE_EXPIRED: "Remove Expired"
      REMOVE_PURCHASED: "Remove Purchased"

    item:
      material: HOPPER
      name: '#2CCED2<bold>ғɪʟᴛᴇʀ ʙʏ ᴛʏᴘᴇ'
      lore:
        - '#92ffffAvailable types:'
        # Placeholders for each type (formatted by enable/disable-text).
        - '%ALL%'
        - '%SALE%'
        - '%PURCHASE%'
        - '%REMOVE_LISTED%'
        - '%REMOVE_SELLING%'
        - '%REMOVE_EXPIRED%'
        - '%REMOVE_PURCHASED%'
        - ''
        - '#8c8c8c• #2CCED2Click #92ffffto change the filter type'

  #---------------------------------------------------------------------------
  # FILTER BY DATE BUTTON
  #---------------------------------------------------------------------------
  # Cycles through date range filters.

  filter-date:
    # Button type - handles date filtering.
    type: ZAUCTIONHOUSE_ADMIN_LOGS_FILTER_DATE

    slot: 51

    # Format for currently selected date range.
    enable-text: ' #F27438➜ %date%'

    # Format for unselected date ranges.
    disable-text: ' #76CDCD➜ %date%'

    # Available date filters.
    filters:
      - ALL         # All time
      - TODAY       # Today only
      - THIS_WEEK   # Last 7 days
      - THIS_MONTH  # Last 30 days
      - THIS_YEAR   # Last 365 days

    # Display names for each date filter.
    filter-names:
      ALL: "All Time"
      TODAY: "Today"
      THIS_WEEK: "This Week"
      THIS_MONTH: "This Month"
      THIS_YEAR: "This Year"

    item:
      material: CLOCK
      name: '#2CCED2<bold>ғɪʟᴛᴇʀ ʙʏ ᴅᴀᴛᴇ'
      lore:
        - '#92ffffAvailable filters:'
        - '%ALL%'
        - '%TODAY%'
        - '%THIS_WEEK%'
        - '%THIS_MONTH%'
        - '%THIS_YEAR%'
        - ''
        - '#8c8c8c• #2CCED2Click #92ffffto change the date filter'
